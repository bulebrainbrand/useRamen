packages:
  - apps/*
  - packages/*

catalogMode: prefer

catalog:
  "@types/node": ^25
  typescript: ^6
  vite: npm:@voidzero-dev/vite-plus-core@latest
  vitest: npm:@voidzero-dev/vite-plus-test@latest
  vite-plus: latest
  react: ^19.2.7
  react-dom: ^19.2.7
  "@types/react": ^19.2.17
  "@types/react-dom": ^19.2.3
  web-vitals: ^5.3.0
  "@vitejs/plugin-react": ^6.0.2
  "@testing-library/react": ^16.3.2
  jsdom: ^29.1.1
  '@testing-library/jest-dom': ^6.9.1
overrides:
  vite: "catalog:"
  vitest: "catalog:"
peerDependencyRules:
  allowAny:
    - vite
    - vitest
  allowedVersions:
    vite: "*"
    vitest: "*"
